{% extends "base.html" %}
{% block title %}Projects — NexChat{% endblock %}
{% block content %}
<div class="projects-page">
  <div class="projects-sidebar">
    <div class="ps-header">
      <a href="{{ url_for('chat') }}" class="back-link">← Chat par wapas jao</a>
      <div class="logo-small" style="margin-top:1rem">
        <svg width="28" height="28" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="#6C63FF"/><path d="M18 28h64v10H18zM18 46h48v10H18zM18 64h36v10H18z" fill="white" opacity=".9"/><circle cx="80" cy="70" r="12" fill="#43D9AD"/></svg>
        <span>Projects</span>
      </div>
    </div>
    <div class="filter-section">
      <div class="field-group">
        <label>Month Filter</label>
        <select id="filterMonth" class="modal-input" onchange="loadProjects()">
          <option value="">Sab Months</option>
          <option value="1">January</option><option value="2">February</option>
          <option value="3">March</option><option value="4">April</option>
          <option value="5">May</option><option value="6">June</option>
          <option value="7">July</option><option value="8">August</option>
          <option value="9">September</option><option value="10">October</option>
          <option value="11">November</option><option value="12">December</option>
        </select>
      </div>
      <div class="field-group">
        <label>Year</label>
        <select id="filterYear" class="modal-input" onchange="loadProjects()">
          <option value="2024">2024</option>
          <option value="2025" selected>2025</option>
          <option value="2026">2026</option>
        </select>
      </div>
    </div>
    <div class="total-card">
      <div class="total-label">Total Earning</div>
      <div class="total-amount" id="totalAmount">PKR 0</div>
      <div class="total-sub" id="totalSub">0 projects</div>
    </div>
  </div>

  <div class="projects-main">
    <div class="pm-header">
      <h2>Mere Projects 📋</h2>
      <button class="btn-primary" onclick="openAddModal()">+ Project Add Karo</button>
    </div>
    <div id="projectsGrid" class="projects-grid">
      <div style="text-align:center;padding:3rem;color:var(--text-muted)">
        <div style="font-size:3rem">📂</div>
        <p>Loading...</p>
      </div>
    </div>
  </div>
</div>

<!-- ADD PROJECT MODAL -->
<div class="modal-overlay" id="addModal" onclick="closeAddModal(event)">
  <div class="modal" onclick="event.stopPropagation()" style="max-width:500px;">
    <div class="modal-header">
      <h3>Naya Project ➕</h3>
      <button onclick="closeAddModal()" class="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <div class="field-group">
        <label>Project Title *</label>
        <input type="text" id="pTitle" class="modal-input" placeholder="e.g. E-commerce Website"/>
      </div>
      <div class="field-group">
        <label>Client Ka Naam</label>
        <input type="text" id="pClient" class="modal-input" placeholder="Client name"/>
      </div>
      <div class="field-group">
        <label>Description</label>
        <textarea id="pDesc" class="modal-input" rows="3" placeholder="Project ke baare mein likho..."></textarea>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
        <div class="field-group">
          <label>Price *</label>
          <input type="number" id="pPrice" class="modal-input" placeholder="50000" min="0"/>
        </div>
        <div class="field-group">
          <label>Currency</label>
          <select id="pCurrency" class="modal-input">
            <option value="PKR">PKR</option>
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
            <option value="GBP">GBP</option>
          </select>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
        <div class="field-group">
          <label>Month</label>
          <select id="pMonth" class="modal-input">
            <option value="1">January</option><option value="2">February</option>
            <option value="3">March</option><option value="4">April</option>
            <option value="5">May</option><option value="6">June</option>
            <option value="7">July</option><option value="8">August</option>
            <option value="9">September</option><option value="10">October</option>
            <option value="11">November</option><option value="12">December</option>
          </select>
        </div>
        <div class="field-group">
          <label>Year</label>
          <select id="pYear" class="modal-input">
            <option value="2024">2024</option>
            <option value="2025" selected>2025</option>
            <option value="2026">2026</option>
          </select>
        </div>
      </div>
      <div class="field-group">
        <label>Status</label>
        <select id="pStatus" class="modal-input">
          <option value="pending">⏳ Pending</option>
          <option value="inprogress">🔄 In Progress</option>
          <option value="completed">✅ Completed</option>
          <option value="paid">💰 Paid</option>
        </select>
      </div>
      <button class="btn-primary" onclick="addProject()">Project Save Karo 💾</button>
    </div>
  </div>
</div>

<script>
const MONTHS = ['','January','February','March','April','May','June','July','August','September','October','November','December'];
const STATUS_LABELS = { pending:'⏳ Pending', inprogress:'🔄 In Progress', completed:'✅ Completed', paid:'💰 Paid' };
const STATUS_COLORS = { pending:'#F7C59F', inprogress:'#6C63FF', completed:'#43D9AD', paid:'#FF6584' };

// Set current month
const now = new Date();
document.getElementById('pMonth').value = now.getMonth() + 1;
document.getElementById('filterMonth').value = now.getMonth() + 1;

async function loadProjects() {
  const month = document.getElementById('filterMonth').value;
  const year = document.getElementById('filterYear').value;
  let url = '/api/projects?';
  if (month) url += `month=${month}&`;
  if (year) url += `year=${year}`;

  const res = await fetch(url);
  const data = await res.json();

  const grid = document.getElementById('projectsGrid');
  if (data.projects.length === 0) {
    grid.innerHTML = `<div style="text-align:center;padding:3rem;color:var(--text-muted);grid-column:1/-1">
      <div style="font-size:3rem">📂</div>
      <p>Is month mein koi project nahi.<br>+ dabao pehla project add karo!</p>
    </div>`;
    document.getElementById('totalAmount').textContent = `PKR 0`;
    document.getElementById('totalSub').textContent = '0 projects';
    return;
  }

  grid.innerHTML = data.projects.map(p => `
    <div class="project-card" id="pc-${p.id}">
      <div class="pc-header">
        <div>
          <div class="pc-title">${p.title}</div>
          ${p.client_name ? `<div class="pc-client">👤 ${p.client_name}</div>` : ''}
        </div>
        <span class="pc-badge" style="background:${STATUS_COLORS[p.status]}20;color:${STATUS_COLORS[p.status]}">${STATUS_LABELS[p.status]}</span>
      </div>
      ${p.description ? `<div class="pc-desc">${p.description}</div>` : ''}
      <div class="pc-footer">
        <div class="pc-price">${p.currency} ${p.price.toLocaleString()}</div>
        <div class="pc-actions">
          <select onchange="updateStatus(${p.id}, this.value)" class="status-select">
            ${Object.entries(STATUS_LABELS).map(([k,v]) => `<option value="${k}" ${k===p.status?'selected':''}>${v}</option>`).join('')}
          </select>
          <button onclick="deleteProject(${p.id})" class="del-btn" title="Delete">🗑️</button>
        </div>
      </div>
      <div class="pc-date">📅 ${p.created_at}</div>
    </div>
  `).join('');

  const curr = data.currency || (data.projects[0]?.currency || 'PKR');
  document.getElementById('totalAmount').textContent = `${curr} ${data.total.toLocaleString()}`;
  document.getElementById('totalSub').textContent = `${data.projects.length} project${data.projects.length > 1 ? 's' : ''}`;
}

async function addProject() {
  const title = document.getElementById('pTitle').value.trim();
  const price = document.getElementById('pPrice').value;
  if (!title) { alert('Title zaroori hai!'); return; }
  if (!price) { alert('Price daalo!'); return; }

  const payload = {
    title, price, 
    client_name: document.getElementById('pClient').value.trim(),
    description: document.getElementById('pDesc').value.trim(),
    currency: document.getElementById('pCurrency').value,
    month: document.getElementById('pMonth').value,
    year: document.getElementById('pYear').value,
    status: document.getElementById('pStatus').value
  };

  const res = await fetch('/api/projects', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(payload)
  });
  const data = await res.json();
  if (data.success) {
    closeAddModal();
    // Reset form
    ['pTitle','pClient','pDesc','pPrice'].forEach(id => document.getElementById(id).value = '');
    loadProjects();
  }
}

async function deleteProject(id) {
  if (!confirm('Project delete karna chahte ho?')) return;
  await fetch(`/api/projects/${id}`, { method: 'DELETE' });
  document.getElementById(`pc-${id}`)?.remove();
  loadProjects();
}

async function updateStatus(id, status) {
  await fetch(`/api/projects/${id}`, {
    method: 'PUT',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ status })
  });
  loadProjects();
}

function openAddModal() { document.getElementById('addModal').style.display = 'flex'; }
function closeAddModal(e) {
  if (!e || e.target === document.getElementById('addModal'))
    document.getElementById('addModal').style.display = 'none';
}

loadProjects();
</script>
{% endblock %}
